<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Image Page</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff5f9, #ffe4ec);
      font-family: Arial, sans-serif;
    }
    .card {
      background: rgba(255,255,255,0.85);
      padding: 24px;
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
      text-align: center;
    }
    img {
      width: min(80vw, 420px);
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 20px;
    }
    h1 {
      margin-top: 16px;
      color: #7c3aed;
      font-size: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://www.image2url.com/r2/default/files/1783115151939-bb67cb73-4d90-4f44-b272-ff87f7f638c2.jpg" alt="Birthday cake illustration" />
    <h1>pishachniiiiii</h1>
  </div>
</body>
</html>
