<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Page</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff5f9, #ffe4ec);
      font-family: Arial, sans-serif;
    }
    .card {
      text-align: center;
      background: rgba(255,255,255,0.85);
      padding: 24px;
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }
    img {
      width: min(80vw, 420px);
      height: auto;
      border-radius: 20px;
      display: block;
      margin: 0 auto 16px;
    }
    h1 {
      color: #7c3aed;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://www.image2url.com/r2/default/files/1783116423662-9b992b83-7243-4f84-b03e-58315f631677.jpg" alt="Birthday cake illustration" />
    <h1></h1>
  </div>
</body>
</html>
